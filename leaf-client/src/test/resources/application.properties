# Redis配置
redis.host=localhost
redis.port=6379
redis.password=123456
redis.database=0

# 默认使用Redis号段模式
easy.id.redis.enable=true
easy.id.redis.host=${redis.host}
easy.id.redis.port=${redis.port}
easy.id.redis.password=${redis.password}
easy.id.redis.step=1000
easy.id.redis.update-percent=0.9
easy.id.redis.key-prefix=easy:id:test:
easy.id.redis.enable-adaptive-step=true
easy.id.redis.min-step=1000
easy.id.redis.max-step=10000 