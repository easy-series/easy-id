leaf.name=com.sankuai.leaf.opensource.test
leaf.segment.enable=true
leaf.jdbc.url=jdbc:mysql://localhost:3306/leaf?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&failOverReadOnly=false
leaf.jdbc.username=root
leaf.jdbc.password=123456

# Redis配置
redis.host=localhost
redis.port=6379
redis.password=123456
redis.database=0

# Redis号段配置
leaf.segment.redis.enable=true
leaf.redis.host=localhost
leaf.redis.port=6379
leaf.redis.password=123456
leaf.segment.redis.step=1000
leaf.segment.redis.update-percent=0.9
leaf.segment.redis.key-prefix=leaf:segment:
leaf.segment.redis.enable-adaptive-step=true
leaf.segment.redis.min-step=1000
leaf.segment.redis.max-step=100000

leaf.snowflake.enable=false
