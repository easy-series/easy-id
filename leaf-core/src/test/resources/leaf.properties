leaf.name=default
leaf.zk.list=localhost

leaf.jdbc.url=jdbc:mysql://localhost:3306/leaf?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&failOverReadOnly=false
leaf.jdbc.username=root
leaf.jdbc.password=123456

# Redis配置
redis.host=localhost
redis.port=6379
redis.password=123456
redis.database=0

# Redis号段配置
leaf.redis.segment.step=1000
leaf.redis.segment.update-percent=0.9
leaf.redis.segment.key-prefix=leaf:segment:
leaf.redis.segment.max-step=1000000
leaf.redis.segment.min-step=1000
leaf.redis.segment.enable-adaptive-step=true
leaf.redis.segment.step-adjust-window=900000
